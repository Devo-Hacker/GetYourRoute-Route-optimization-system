<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Route Optimizer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">
  <header class="topbar">
  <div class="brand">
    <span class="brand-icon">🧭</span>
    <span class="brand-name">Route Optimizer</span>
  </div>
  <button type="button" id="themeToggle" class="theme-toggle" title="Toggle dark mode">🌙</button>
</header>

  <div class="layout">
    <aside class="panel">
      <h2 class="panel-title">Plan your route</h2>

      <form id="routeForm">
        <div class="field">
          <label for="startInput">From</label>
          <div class="input-row">
            <input type="text" id="startInput" placeholder="Enter starting point" autocomplete="off" />
            <button type="button" class="pick-btn" id="pickStartBtn" title="Pick on map">📍</button>
          </div>
        </div>

        <div class="field">
          <label for="endInput">To</label>
          <div class="input-row">
            <input type="text" id="endInput" placeholder="Enter destination" autocomplete="off" />
            <button type="button" class="pick-btn" id="pickEndBtn" title="Pick on map">📍</button>
          </div>
        </div>

        <div class="field">
          <label>Route type</label>
          <div class="toggle-group">
            <button type="button" class="toggle-btn is-active" data-algo="dijkstra">Shortest Route</button>
            <button type="button" class="toggle-btn" data-algo="astar">Fastest Route</button>
          </div>
        </div>

        <div class="field">
  <label>Vehicle type</label>
  <div class="toggle-group">
    <button type="button" class="toggle-btn vehicle-btn" data-mileage="45" data-speed="35">Bike</button>
    <button type="button" class="toggle-btn vehicle-btn is-active" data-mileage="15" data-speed="40">Car</button>
    <button type="button" class="toggle-btn vehicle-btn" data-mileage="4" data-speed="30">Truck</button>
  </div>
  
</div>

        <div class="field split">
          <div>
            <label for="mileageInput">Mileage (km/L)</label>
            <input type="number" id="mileageInput" placeholder="15" min="1" step="0.5" />
          </div>
          <div>
            <label for="speedInput">Avg speed (km/h)</label>
            <input type="number" id="speedInput" placeholder="30" min="1" step="1" />
          </div>
        </div>

        <button type="submit" class="compute-btn" id="computeBtn">Find Route</button>
      </form>
    </aside>

   <main class="map-wrap">
  <div class="map-search">
    <input type="text" id="mapSearchInput" placeholder="Search a place..." autocomplete="off" />
    <button type="button" id="mapSearchBtn" title="Search">🔍</button>
    <button type="button" id="useLocationBtn" title="Use my current location">📍</button>
  </div>
  <div class="poi-buttons" id="poiButtons">
  <button type="button" class="poi-btn" data-type="hotel">🏨 Hotels</button>
  <button type="button" class="poi-btn" data-type="hospital">🏥 Hospitals</button>
  <button type="button" class="poi-btn" data-type="railway">🚉 Stations</button>
</div>
  <div id="map"></div>
  <div class="map-hint" id="mapHint" hidden></div>
</main>
  </div>

  <section class="results" id="resultsPanel">
    <div id="resultsBody" class="results-empty">
      Enter a start and end point, then hit "Find Route" to see your path.
    </div>
  </section>
  <div id="toast" class="toast" hidden></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script type="module" src="map.js"></script>
</body>
</html>
